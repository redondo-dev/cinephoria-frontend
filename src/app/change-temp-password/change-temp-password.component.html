 <div class="change-password-container">
      <div class="change-password-card">
        <div class="header">
          <h2>Changement de mot de passe requis</h2>
          <p class="subtitle">
            Vous utilisez un mot de passe temporaire. Veuillez le changer pour continuer.
          </p>
        </div>

        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="tempPassword">Mot de passe temporaire</label>
            <input
              type="password"
              id="tempPassword"
              [(ngModel)]="tempPassword"
              name="tempPassword"
              placeholder="Mot de passe reçu par email"
              required
              [disabled]="submitting()">
          </div>

          <div class="form-group">
            <label for="newPassword">Nouveau mot de passe</label>
            <input
              type="password"
              id="newPassword"
              [(ngModel)]="newPassword"
              name="newPassword"
              placeholder="Minimum 6 caractères"
              required
              minlength="6"
              [disabled]="submitting()">
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirmer le nouveau mot de passe</label>
            <input
              type="password"
              id="confirmPassword"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="Retapez votre nouveau mot de passe"
              required
              [disabled]="submitting()">
          </div>

          @if (error()) {
            <p class="error">{{ error() }}</p>
          }

          <button
            type="submit"
            class="btn-submit"
            [disabled]="submitting()">
            {{ submitting() ? 'Changement en cours...' : 'Changer le mot de passe' }}
          </button>
        </form>

        <button
          type="button"
          class="btn-logout"
          (click)="logout()"
          [disabled]="submitting()">
          Se déconnecter
        </button>
      </div>
