<div class="dashboard-container" [class.hidden]="loading || error">
  <div class="burger-container">
    <button class="burger-btn" (click)="toggleSidebar()" aria-label="Menu">
      <span class="burger-icon">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
  </div>

  <div class="dashboard-header">
    <div class="header-left">
      <span class="dashboard-label">Analytics</span>
      <h1 class="dashboard-title">Tableau de bord</h1>
    </div>
    <div class="period-badge" *ngIf="periodInfo">
      <span class="period-icon">⬤</span>
      <span>
        {{ periodInfo.from | date : 'dd MMM' }} →
        {{ periodInfo.to | date : 'dd MMM yyyy' }}
      </span>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-card-header">
      <span class="chart-title">Réservations par film</span>
      <span class="chart-subtitle">7 derniers jours</span>
    </div>
    <div class="chart-wrapper">
      <canvas #reservationsChart></canvas>
    </div>
  </div>
</div>

<div class="state-container" *ngIf="loading">
  <div class="spinner"></div>
  <p>Chargement des données...</p>
</div>

<div class="state-container error-state" *ngIf="error">
  <p>{{ error }}</p>
</div>
