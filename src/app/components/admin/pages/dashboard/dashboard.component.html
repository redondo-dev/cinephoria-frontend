<div class="dashboard-container" [class.hidden]="loading || error">
  <!-- BOUTON BURGER (mobile/tablette) -->
  <div class="burger-container">
    <button class="burger-btn" (click)="toggleSidebar()">
      ☰
    </button>
  </div>
  <h1 class="dashboard-title">Tableau de bord des réservations</h1>

  <p class="dashboard-period" *ngIf="periodInfo">
    Période : <strong>{{ periodInfo.from | date : 'dd/MM/yyyy' }}</strong> →
    <strong>{{ periodInfo.to | date : 'dd/MM/yyyy' }}</strong>
  </p>

  <div class="chart-wrapper">
    <canvas #reservationsChart></canvas>
  </div>
</div>

<div class="loading" *ngIf="loading">
  <div class="spinner"></div>
  <p>Chargement des données...</p>
</div>

<div class="error" *ngIf="error">
  <p>{{ error }}</p>
</div>
