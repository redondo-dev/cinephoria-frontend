<!-- src/app/features/contact/contact.component.html -->
<div class="contact-page">
  <div class="contact-container">
    <h1>Contactez Cinéphoria</h1>
    <p class="subtitle">Vous avez une question ou un problème ? Envoyez-nous un message.</p>

    <!-- Messages de succès et erreur -->
    <div class="success-message" *ngIf="showSuccess">Votre message a bien été envoyé.</div>
    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
      <!-- Champ nom -->
      <div class="form-group">
        <label for="nom">Nom (facultatif)</label>
        <input id="nom" type="text" formControlName="nom" class="form-control">
      </div>
      <!-- Champ email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="text" formControlName="email" class="form-control">
      </div>
      <!-- Champ titre -->
      <div class="form-group">
        <label for="titre">Titre <span class="required">*</span></label>
        <input id="titre" type="text" formControlName="titre" class="form-control">
      </div>
      <!-- Champ description -->
      <div class="form-group">
        <label for="description">Description <span class="required">*</span></label>
        <textarea id="description" formControlName="description" rows="6" class="form-control"></textarea>
      </div>
      <button type="submit" class="btn-submit" [disabled]="contactForm.invalid || isSubmitting">
        Envoyer
      </button>
    </form>
    <!-- Bannière de succès -->
    <div *ngIf="showSuccess" class="success-banner">
      ✅ Votre message a bien été envoyé !
    </div>

    <!-- Message d'erreur -->
    <div *ngIf="errorMessage" class="error-banner">
      ⚠️ {{ errorMessage }}
    </div>
  </div>
</div>
