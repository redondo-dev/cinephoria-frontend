 <div class="salles-container">
      <h2>Gestion des Salles</h2>

      <button (click)="showForm = !showForm">
        {{ showForm ? 'Annuler' : 'Ajouter une salle' }}
      </button>

      <form *ngIf="showForm" (ngSubmit)="saveSalle()" class="salle-form">
        <input [(ngModel)]="currentSalle.nom" name="nom" placeholder="Nom de la salle" required>
        <input [(ngModel)]="currentSalle.nombrePlaces" name="nombrePlaces" type="number" placeholder="Nombre de places" required>

        <select [(ngModel)]="currentSalle.qualiteProjection" name="qualiteProjection" required>
          <option value="">-- Qualité de projection --</option>
          <option value="Standard">Standard</option>
          <option value="IMAX">IMAX</option>
          <option value="3D">3D</option>
          <option value="4DX">4DX</option>
        </select>

        <button type="submit">{{ currentSalle.id ? 'Modifier' : 'Créer' }}</button>
      </form>

      <table *ngIf="salles.length > 0">
        <thead>
          <tr>
            <th>Nom</th>
            <th>Nombre de places</th>
            <th>Qualité</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let salle of salles">
            <td>{{ salle.nom }}</td>
            <td>{{ salle.nombrePlaces }}</td>
            <td>{{ salle.qualiteProjection }}</td>
            <td>
              <button (click)="editSalle(salle)">Modifier</button>
              <button (click)="deleteSalle(salle.id!)">Supprimer</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
