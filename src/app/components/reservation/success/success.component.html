<div class="success-container" *ngIf="!isLoading && !error; else loadingOrError">
  <div class="success-icon">✅</div>
  <h1>Réservation confirmée !</h1>

  <div class="confirmation-details">
    <p>Numéro de réservation : <strong>{{ reservationId }}</strong></p>
    <p>Film : <strong>{{ filmTitle }}</strong></p>
    <p>Cinéma : <strong>{{ cinemaName }}</strong></p>
    <p>Séance : <strong>{{ showTime }}</strong></p>
    <p>Sièges : <strong>{{ formattedSeats }}</strong></p>
  </div>

  <!-- ✅ QR Code -->
  <div class="qr-code-container">
    <h3>Votre QR Code :</h3>

    <!-- Option 1 : via API externe -->
    <img [src]="qrCodeUrl" alt="QR Code de la réservation" width="200" height="200" />

    <!-- Option 2 : via angularx-qrcode -->
    <!-- <qrcode [qrdata]="reservationId?.toString()" [width]="200" [errorCorrectionLevel]="'M'"></qrcode> -->


  </div>

  <div class="actions">
    <button (click)="downloadTicket()">📄 Télécharger le billet</button>
    <button (click)="sendByEmail()">📧 Envoyer par email</button>
    <button (click)="goToMyReservations()">🎟️ Mes réservations</button>
    <button (click)="bookAnother()">➕ Nouvelle réservation</button>
    <button (click)="goToHome()">🏠 Accueil</button>
  </div>
</div>

<ng-template #loadingOrError>
  <div *ngIf="isLoading">Chargement...</div>
  <div *ngIf="error">Erreur lors du chargement de la réservation.</div>
</ng-template>
