<nav class="navbar">
  <div class="navbar-container">
    <!-- Logo -->
    <div class="navbar-logo">
      <a routerLink="/home" class="logo-link">
        <span class="logo-icon">🎬</span>
        <span class="logo-text">Cinephoria</span>
      </a>
    </div>

    <!-- Menu Burger Toggle -->
    <div class="menu-toggle" [class.active]="menuOpen" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- Menu Principal -->
    <div class="navbar-menu" [class.active]="menuOpen">
      <ul class="nav-links">
        <li><a routerLink="/home" routerLinkActive="active" (click)="closeMenu()">Acceuil</a></li>
        <li><a routerLink="/films" routerLinkActive="active" (click)="closeMenu()">Films</a></li>
        <li><a routerLink="/reservation" routerLinkActive="active" (click)="closeMenu()">Réservations</a></li>
        <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
      </ul>

      <!-- Bouton Connexion -->
      <div class="auth-section">

        <a *ngIf="!(isAuthenticated$ | async)" routerLink="/auth/login" (click)="closeMenu()" class="btn-login">
          Se connecter</a>

        <!-- Si connecté -->
        <div *ngIf="isAuthenticated$ | async" class="user-section">
          <span class="user-name" *ngIf="currentUser$ | async as user">
            Bonjour, {{ user.name }}
          </span>
          <button (click)="logout(); closeMenu()" class="btn-logout">
            Se déconnecter
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
